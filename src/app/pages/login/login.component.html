<app-toast></app-toast>

<div class="min-h-screen flex flex-col md:flex-row bg-[#071a26]">

    <!-- Mobile Top Logo Section -->
    <div class="md:hidden flex flex-col items-center justify-center py-8
                bg-gradient-to-br from-[#0b2a3a] to-[#071a26]">
        <img src="assets/landing/sh-no.png" class="w-32 mb-3">
        <h1 class="text-2xl tracking-widest text-gray-300">
            ACQUISITION
        </h1>
        <p class="text-gray-400 text-sm">
            Common Data Framework
        </p>
    </div>

    <!-- Left Section Desktop -->
    <div class="hidden md:flex w-1/2 relative items-center justify-center
                bg-gradient-to-br from-[#0b2a3a] to-[#071a26]">

        <!-- Background Shapes -->
        <div class="absolute w-72 h-72 bg-blue-400/10 rotate-45 left-10 top-10"></div>
        <div class="absolute w-72 h-72 bg-blue-400/10 rotate-45 right-10 bottom-10"></div>

        <!-- Logo + Text -->
        <div class="text-center px-6">
            <img src="assets/landing/sh-no.png" class="w-48 lg:w-64 mx-auto drop-shadow-2xl">
            <h1 class="text-3xl lg:text-4xl tracking-widest text-gray-300 mt-6">
                ACQUISITION
            </h1>
            <p class="text-gray-400 mt-2">
                Common Data Framework
            </p>
        </div>
    </div>

    <!-- Right Login Card -->
    <div class="flex w-full md:w-1/2 items-center justify-center p-4 sm:p-6">

        <div class="w-full max-w-md rounded-2xl overflow-hidden shadow-2xl
                    border border-gray-500/30 bg-white/5 backdrop-blur-lg">

            <!-- Header -->
            <div class="bg-gray-200 text-center p-5 sm:p-6">
                <img src="assets/acq_logo.png" class="w-12 sm:w-14 mx-auto mb-2">
                <h2 class="text-lg sm:text-2xl text-gray-700 font-semibold">
                    Welcome to ACQUISITION CDF
                </h2>
                <p class="text-xs sm:text-sm text-gray-500 mt-1">
                    Authenticate to continue
                </p>
            </div>

            <!-- Form -->
            <div class="p-5 sm:p-6 space-y-4 bg-gradient-to-b from-[#1c2b36] to-[#0e1f29]">

                <!-- Username -->
                <div>
                    <label class="text-gray-300 text-sm">Username</label>
                    <input type="text" [(ngModel)]="credentials.username" name="username" (keyup.enter)="handleLogin()"
                        placeholder="Enter username" class="w-full mt-1 px-4 py-2 sm:py-3 rounded-lg
 bg-transparent border border-cyan-400
 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400">
                </div>

                <!-- Password -->
                <div>
                    <label class="text-gray-300 text-sm">Password</label>
                    <input type="password" [(ngModel)]="credentials.password" name="password"
                        (keyup.enter)="handleLogin()" placeholder="Enter password" class="w-full mt-1 px-4 py-2 sm:py-3 rounded-lg
 bg-transparent border border-gray-500
 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400">
                </div>

                <div class="text-right">
                    <a class="text-cyan-400 text-sm cursor-pointer">Forgot?</a>
                </div>
<button
  (click)="handleLogin()"
  [disabled]="loading"
  class="w-full py-3 rounded-xl text-white font-semibold
  bg-gradient-to-r from-blue-400 to-cyan-400
  disabled:opacity-50 flex justify-center items-center gap-2">

  <span *ngIf="loading"
        class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4">
  </span>

  <span *ngIf="loading">Signing In...</span>
  <span *ngIf="!loading">SIGN IN</span>

</button>

               
                <!-- Footer -->
                <div class="text-center text-gray-400 text-xs mt-4">
                    <span class="text-green-400">●</span>
                    © Indian Navy · Secure Network
                </div>

            </div>
        </div>
    </div>
</div>
