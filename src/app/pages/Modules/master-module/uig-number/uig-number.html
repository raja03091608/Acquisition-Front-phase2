<app-paginate-table
  [title]="'UIG List'"
  [description]="'Manage UIG Data'"

  [url]="url"


  [columnDefs]="columnDefs"
  [showSearch]="true"
  [showAddButton]="true"
  [showPagination]="true"
     [showBackButton]="true"
  (onAddButtonClick)="onAddClick()"
   [reloadTrigger]="reloadFlag"

  (onBackClick)="goBack()"

>
</app-paginate-table>







<app-form-card-dialog
  [open]="isFormOpen"
  [title]="isEditMode ? 'Edit UIG Number' : 'Add UIG Number'"
  [subtitle]="isEditMode ? 'Update UIG Number' : 'Create new UIG Number'"
  (close)="isFormOpen = false"
  [showFooter]="false"
>
  <app-add-form
    [formConfig]="formConfig"
    [apiUrl]="currentApiUrl"
    [formData]="formData"
    [isEditMode]="isEditMode"
    [submitLabel]="isEditMode ? 'Update' : 'Save'"
    (onSubmit)="handleSuccess()"
    [extraPayload]="extraPayload"
    [forcePost]="true"
  ></app-add-form>
</app-form-card-dialog>

<app-reusable-delete-dialog
  [open]="isDeleteOpen"
  [id]="deleteId"
  [name]="deleteName"
  entityType="UIG Number"
  (confirm)="handleDeleteConfirm()"
  (cancel)="onDeleteCancel()"
>
</app-reusable-delete-dialog>
