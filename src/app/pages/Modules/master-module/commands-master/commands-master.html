<app-paginate-table
  [title]="'Commands Master'"
  [description]="'Manage all commands here'"
  [url]="url"
  [columnDefs]="columnDefs"
  [showSearch]="true"
  [showAddButton]="true"
  [showPagination]="true"
  (onAddButtonClick)="onAddClick()"
  [reloadTrigger]="reloadFlag">
</app-paginate-table>



<app-form-card-dialog
  [open]="isFormOpen"
  [title]="isEditMode ? 'Edit Commands' : 'Add Commands'"
  [subtitle]="isEditMode ? 'Update Commands' : 'Create new Commands'"
  (close)="isFormOpen = false"
  [showFooter]="false"
>
<app-add-form
  [formConfig]="formConfig"
  [apiUrl]="currentApiUrl"
  [formData]="formData"
  [isEditMode]="isEditMode"
  [submitLabel]="isEditMode ? 'Update' : 'Save'"
  (onSubmit)="handleSuccess()"
  [extraPayload]="extraPayload"
  [forcePost]="true"
></app-add-form>
</app-form-card-dialog>

<app-reusable-delete-dialog
  [open]="isDeleteOpen"
  [id]="deleteId"
  [name]="deleteName"
  entityType="Commands"
  (confirm)="handleDeleteConfirm()"
  (cancel)="onDeleteCancel()"
>
</app-reusable-delete-dialog>
