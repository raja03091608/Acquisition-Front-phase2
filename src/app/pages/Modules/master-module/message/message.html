<app-paginate-table
  [title]="'Massage'"
  [description]="'Manage all Message here'"
  [url]="url"
  [columnDefs]="columnDefs"
  [showSearch]="true"
  [showAddButton]="true"
  [showPagination]="true"
  (onAddButtonClick)="onAddClick()"
   [reloadTrigger]="reloadFlag"
>
</app-paginate-table>

<app-form-card-dialog
  [open]="isFormOpen"
  [title]="isEditMode ? 'Edit Message' : 'Add Message'"
  [subtitle]="isEditMode ? 'Update message' : 'Create new message'"
  (close)="isFormOpen = false"
  [showFooter]="false"
>
  <app-add-form
    [formConfig]="formConfig"
    [apiUrl]="currentApiUrl"
    [formData]="formData"
    [isEditMode]="isEditMode"
    [submitLabel]="isEditMode ? 'Update' : 'Save'"
   (onSubmit)="handleSuccess()"
  ></app-add-form>
</app-form-card-dialog>

<app-reusable-delete-dialog
  [open]="isDeleteOpen"
  [id]="deleteId"
  [name]="deleteName"
  entityType="Message"
  [loading]="isDeleting"
  (confirm)="handleDeleteConfirm()"
  (cancel)="onDeleteCancel()"
>
</app-reusable-delete-dialog>
