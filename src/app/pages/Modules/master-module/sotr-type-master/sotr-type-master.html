<app-paginate-table
  [title]="'SOTR Type Master'"
  [description]="'Manage all SOTR Type here'"
  [url]="url"
  [columnDefs]="columnDefs"
  [showSearch]="true"
  [showAddButton]="true"
  [showPagination]="true"
  (onAddButtonClick)="onAddClick()"
    [reloadTrigger]="reloadFlag">
</app-paginate-table>




<app-form-card-dialog
  [open]="isFormOpen"
  [title]="isEditMode ? 'Edit SOTR Type' : 'Add SOTR Type'"
  [subtitle]="isEditMode ? 'Update SOTR Type' : 'Create new SOTR Type'"
  (close)="isFormOpen = false"
  [showFooter]="false"
>
  <app-add-form
    [formConfig]="formConfig"
    [apiUrl]="currentApiUrl"
    [formData]="formData"
    [isEditMode]="isEditMode"
    [submitLabel]="isEditMode ? 'Update' : 'Save'"
    (onSubmit)="handleSuccess()"
    [extraPayload]="extraPayload"
    [forcePost]="true"
  ></app-add-form>
</app-form-card-dialog>

<app-reusable-delete-dialog
  [open]="isDeleteOpen"
  [id]="deleteId"
  [name]="deleteName"
  entityType="SOTR Type"
  (confirm)="handleDeleteConfirm()"
  (cancel)="onDeleteCancel()"
>
</app-reusable-delete-dialog>
