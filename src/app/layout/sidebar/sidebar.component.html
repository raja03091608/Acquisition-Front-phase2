<!-- MOBILE OVERLAY -->
<div
  *ngIf="isMobile && !collapsed"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"
  (click)="close.emit()"
></div>

<!-- SIDEBAR -->
<div
  class="flex flex-col text-white shadow-2xl h-screen transition-all duration-300 overflow-hidden bg-cover bg-center bg-no-repeat relative"
  [ngClass]="{
    'w-16': !isMobile && collapsed,
    'w-60': !isMobile && !collapsed,
    'w-0': isMobile && collapsed,
    'w-64 fixed left-0 top-0 z-50': isMobile && !collapsed,
  }"
  [style.background-image]="'url(assets/bg.png)'"
>
  <!-- PROFILE CARD -->
  <div class="px-3 pt-3 pb-2 shrink-0">
    <div
      *ngIf="!collapsed || isMobile"
      class="flex flex-col items-center gap-2"
    >
      <div class="w-full bg-white rounded-2xl px-3 py-4 text-center shadow-md">
        <img
          src="/assets/acq_logo.png"
          class="h-12 mx-auto object-contain mb-2"
        />

        <p class="text-[10px] font-semibold text-gray-600 leading-tight">
          ACQUISITION COMMON DATAFRAMEWORK
        </p>

        <p class="text-sm font-semibold text-gray-800 mt-2 truncate">
          P.NO: {{userData?.loginname}}
        </p>

        <p class="text-sm text-gray-800 truncate">Name: {{userData?.first_name}}</p>

        <p class="text-sm text-gray-700 truncate">Role: {{userData?.role_center[0]?.user_role?.name}}</p>
      </div>

      <!-- MOBILE CLOSE BUTTON -->
      <button
        *ngIf="isMobile"
        (click)="close.emit()"
        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:bg-white/10 hover:text-white"
      >
        <lucide-icon [img]="XIcon" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- MENU -->

  <nav
    class="flex-1 overflow-y-auto overflow-x-hidden pr-1 -mr-2 px-2 py-3 space-y-0.5"
  >
    <ng-container *ngFor="let item of sidebarItems">
      <!-- <a
        *ngIf="item.path"
        [routerLink]="item.path"
        class="group flex items-center gap-3 px-4 py-1 my-2 rounded-2xl cursor-pointer transition-all duration-200 relative mx-2 mr-5"
        [ngClass]="{
          'bg-white/25 border border-white/30 text-white shadow-lg': isActive(
            item.path
          ),
          'border border-white/10 text-slate-300 hover:bg-white/10 hover:text-white':
            !isActive(item.path),
          'justify-center px-0': collapsed && !isMobile,
        }"
      > -->
<a
  *ngIf="item.path"
  [routerLink]="item.path"
  class="group flex items-center gap-3 px-4 py-1 my-2 rounded-xl cursor-pointer
  transition-all duration-300 ease-out transform mx-2 mr-4 relative will-change-transform"

  [ngClass]="{
    'bg-white/25 border border-white/30 text-white shadow-lg shadow-white/10 scale-[1.02]': isActive(item.path),

    'border border-white/10 text-slate-300
     hover:bg-white/10 hover:text-white
     hover:translate-x-2 hover:scale-[1.02]
     hover:shadow-lg hover:shadow-white/10':
      !isActive(item.path),

    'justify-center px-0 hover:translate-x-0 hover:scale-100': collapsed && !isMobile
  }"
>
        <div
          class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
        >
          <lucide-icon [img]="item.icon" class="w-4 h-4"></lucide-icon>
        </div>

        <span
          *ngIf="!collapsed || isMobile"
          class="text-sm font-medium flex-1 truncate"
        >
          {{ item.title }}
        </span>
      </a>
    </ng-container>
  </nav>
</div>
