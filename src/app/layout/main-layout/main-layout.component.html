<div class="h-screen flex bg-background">

  <!-- Sidebar -->
  <app-sidebar [collapsed]="sidebarCollapsed" [isMobile]="isMobile" (close)="sidebarCollapsed = true">
  </app-sidebar>

  <!-- Content -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Header -->
    <app-header [isMobile]="isMobile" (toggleSidebar)="toggleSidebar()">
    </app-header>

    <!-- Routed Pages -->
    <main class="flex-1 overflow-auto pb-0" [ngClass]="isMobile ? 'p-1' : 'p-2'">

      <router-outlet></router-outlet>

    </main>
  </div>
</div>
