<div class="border border-gray-200 rounded-md shadow-sm overflow-hidden">

  <div class="flex items-center justify-between px-4 py-3 cursor-pointer bg-gray-100" (click)="toggleAccordion()">

    <div class="text-sm text-gray-800 font-medium">
      <ng-content select="[accordion-title]"></ng-content>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform duration-200"
      [class.rotate-180]="isOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
    </svg>

  </div>

  <div *ngIf="isOpen" class="p-4 border-t bg-white">
    <ng-content select="[accordion-content]"></ng-content>
  </div>

</div>
