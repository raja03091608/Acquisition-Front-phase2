<div class="flex flex-col w-full">

  <label *ngIf="label" class="text-sm mb-1">
    {{ label }}
  </label>

  <input type="text" [placeholder]="placeholder" [value]="value" [disabled]="disabled" (input)="onInput($event)"
    (keydown)="allowOnlyNumbers($event)" (blur)="markTouched()" class="w-full px-3 py-2 border rounded-md outline-none
         transition
         disabled:bg-gray-100 disabled:cursor-not-allowed
         border-gray-300
         focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
  <!-- ✅ Error message -->
  <span *ngIf="error" class="text-red-500 text-xs mt-1">
    {{ error }}
  </span>

</div>
