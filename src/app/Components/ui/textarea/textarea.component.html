<div class="w-full flex flex-col gap-1">

  <label *ngIf="label" class="form-label">
    {{ label }}
  </label>

  <textarea [rows]="rows" [placeholder]="placeholder" [disabled]="disabled" [value]="value" (input)="onInput($event)"
    (blur)="markTouched()" class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none
         appearance-none shadow-none bg-white
         leading-normal
         transition
         disabled:bg-gray-100 disabled:cursor-not-allowed
         focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
  </textarea>
</div>
