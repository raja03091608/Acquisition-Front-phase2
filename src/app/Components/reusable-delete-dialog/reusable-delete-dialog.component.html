<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="onCancel()"></div>

  <!-- Dialog Card -->
  <div class="relative z-10 w-[420px] max-w-[90%] bg-white rounded-2xl shadow-2xl p-6 text-center animate-fadeIn">

    <!-- Close -->
    <button
      class="absolute top-3 right-3 text-gray-500 hover:text-black"
      (click)="onCancel()"
    >
      ✕
    </button>

    <!-- Title -->
    <h2 class="text-xl font-semibold text-gray-800 mb-2">
      Do you really want to delete the {{ entityType }}?
    </h2>

    <!-- Illustration -->
    <div class="flex justify-center my-4">
      <img
        src="/assets/bin.png"
        class="w-32 h-32 object-contain"
      />
    </div>

    <!-- Info -->
    <!-- <div class="bg-gray-100 rounded-lg p-3 text-left text-sm mb-5">
      <p><b>ID:</b> {{ id }}</p>
      <p>
        <b>Name:</b>
        {{ name }}</p>
    </div> -->

    <!-- Buttons -->
    <div class="flex justify-center gap-4">

      <!-- Delete -->
      <button
        (click)="onSubmit()"
        class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-md shadow cursor-pointer"
      >
        Yes delete
      </button>

      <!-- Cancel -->
      <button
        (click)="onCancel()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-md shadow cursor-pointer"
      >
        Cancel
      </button>

    </div>

  </div>
</div>
