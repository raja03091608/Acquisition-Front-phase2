


<div class="flex flex-col gap-0">

  <ng-container *ngIf="showHeaderSection">
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">

      <div>
        <h2 *ngIf="title" class="text-lg font-semibold text-slate-800 tracking-tight">
          {{ title }}
        </h2>
        <p *ngIf="description" class="text-xs text-slate-400 mt-0.5">
          {{ description }}
        </p>
      </div>

      <div class="flex items-center gap-2">



        <!-- ✅ SEARCH FIXED -->
        <div *ngIf="showSearch" class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
          <lucide-icon [img]="SearchIcon" class="w-3.5 h-3.5 text-slate-400"></lucide-icon>
          <input
            type="text"
            [value]="searchValue"
            (input)="onSearch($any($event.target).value)"
            placeholder="Search..."
            class="bg-transparent text-sm text-slate-700 placeholder-slate-400 outline-none w-44"
          />
        </div>

        <!-- Dropdown -->
        <div *ngIf="showSelectDropdown" class="custom-select-wrapper">
          <select
            class="custom-select text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white text-slate-700 outline-none cursor-pointer"
            [value]="selectedValue"
            (change)="onSelectChange($event)">
            <option value="" disabled>-- Select --</option>
            <option *ngFor="let option of selectOptions" [value]="option.value">
              {{ option.label }}
            </option>
          </select>
        </div>

        <!-- Import Export -->
        <ng-container *ngIf="showImport || showExport">
          <app-reusable-button *ngIf="showImport" [label]="importLabel" variant="import"
            (clicked)="handleImport.emit()">
          </app-reusable-button>
          <app-reusable-button *ngIf="showExport" [label]="exportLabel" variant="export"
            (clicked)="handleExport.emit()">
          </app-reusable-button>
        </ng-container>
       <button
  *ngIf="showBackButton"
  (click)="onBackClick.emit()"
  class="flex items-center cursor-pointer gap-1.5 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-medium rounded-lg border border-gray-300 transition">

  <lucide-icon [img]="BackIcon" class="w-3.5 h-3.5"></lucide-icon>

  Back
</button>

        <!-- Add Button -->
        <button
          *ngIf="showAddButton"
          (click)="onAddButtonClick.emit()"
          class="flex cursor-pointer items-center gap-1.5 px-3.5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors">
          <lucide-icon [img]="PlusIcon" class="w-3.5 h-3.5"></lucide-icon>
          {{ addButtonText }}
        </button>

      </div>
    </div>
  </ng-container>

  <!-- GRID -->
  <div class="w-full h-[65vh]">
    <ag-grid-angular
      class="w-full h-full"
      [theme]="myTheme"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      [defaultColDef]="defaultColDef"
      [pagination]="showPagination"
      [paginationPageSize]="paginationPageSize"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>

</div>
